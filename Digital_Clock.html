<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background:black;
            padding: 0%;
            margin: 0%;
            color: white;
        }

        .container{
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock{
            font-size: 140px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="clock">3.15 PM</span>
    </div>

    <script>

        const getTime = () =>{
            let d = new Date();

            let h = d.getHours();
            let m = d.getMinutes();
            let s = d.getSeconds();

            return `${h} : ${m} : ${s}`;
        };

         setInterval(() => {

            let clockOb = document.querySelector(".clock");
            clockOb.innerHTML = getTime();
         }, 1000);
    </script>
</body>
</html>
