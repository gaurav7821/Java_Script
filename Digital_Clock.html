<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background:black;
            padding: 0%;
            margin: 0%;
            color: white;
        }

        .container{
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock{
            font-size: 120px;
            border: 1px solid red;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="clock">3.15 PM</span>
    </div>

    <script>

        const getTime = () =>{
            let d = new Date();

            let h = d.getHours();

            let ampm = h>=12 ? "PM" : "AM";

            h = h % 12;

            h = h == 0 ? 12 : h;

            let m = d.getMinutes();

            m = m > 9 ? m : "0" + m;

            let s = d.getSeconds();

            s = s > 9 ? s : "0" + s;

            return `${h} : ${m} : ${s} : ${ampm}`;

            // return d.toLocaleTimeString();
        };

         setInterval(() => {

            let clockOb = document.querySelector(".clock");
            clockOb.innerHTML = getTime();
         }, 1000);
    </script>
</body>
</html>
