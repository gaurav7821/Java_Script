<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <title>Resume Generator </title>
</head>

<body>

    <h1 class="text-center my-2">Resume Generator</h1>
    <p class="text-center">By learnCodewith Gogo</p>

    <div class="row">

        <div class="col-md-6">
            <h3>Personal Information</h3>

            <div class="form-group">
                <label for="nameField">Your Name</label>
                <input type="text" id="nameField" placeholder="Enter here" class="form-control" />
            </div>
            <div class="form-group mt-1">
                <label for="contactField">Your Contact</label>
                <input type="text" id="contachField" placeholder="Enter here" class="form-control" />
            </div>
            <div class="form-group mt-2">
                <label for="addressField">Your Address</label>
                <textarea type="text" id="addressField" placeholder="Enter here" class="form-control"
                    rows="5"></textarea>
            </div>

            <p class=text-secondary my-3>Important Links</p>

            <div class="form-group mt-2">
                <label for="linkField">LinkedIn Link</label>
                <input type="text" id="linkField" placeholder="Enter here" class="form-control" />
            </div>
            <div class="form-group mt-2">
                <label for="gitField">Github Link</label>
                <input type="text" id="gitField" placeholder="Enter here" class="form-control" />
            </div>
            <div class="form-group mt-2">
                <label for="naukriField">Naukri Link</label>
                <input type="text" id="naukriField" placeholder="Enter here" class="form-control" />
            </div>
        </div>
        <div class="col-md-6">
            <h3>Professional Information</h3>

            <div class="form-group mt-2">
                <label for="">Objective</label>
                <textarea 
                placeholder="Enter here" 
                class="form-control"
                rows="5">
            </textarea>
            </div>
            <div class="form-group mt-2" id="we">
                <label for="">Work Experience</label>
                <textarea 
                placeholder="Enter here" 
                class="form-control weField " 
                rows="3">
            </textarea>

                
            </div>
            <div class="container text-center mt-2" id="weAddButtton">
                    <button class="btn btn-primary btn-sm" onclick="addNewWEField()">Add</button>
            </div>
            <div class="form-group mt-2" id="aq">
                <label for="">Academic Qualification</label>
                <textarea 
                placeholder="Enter here" 
                class="form-control aqField" 
                rows="3">
                </textarea>
                <div class="container text-center mt-2" id="aqAddButton">
                    <button class="btn btn-primary btn-sm" onclick="addNewQAField()">Add</button>
            </div>
            </div>
             
            <div class="container">
                <button class="btn btn-primary btn-lg">Generate CV</button>
            </div>
        </div> 

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="script.js"></script>
</body>

</html>
